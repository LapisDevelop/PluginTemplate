# The most important information about the plugin; will go in the paper-plugin.yml and used during build
plugin-name=PluginTemplate
version=0.0.1
description=PluginDescription
paper-api-version=1.19

# Meta information about the plugin, will go in the paper-plugin.yml
website=https://lapisdev.com
authors=["Lapis Development <info@lapisdev.com>", "dylancode <lapis@dylancode.dev>"]
load-type=POSTWORLD

# Dependencies for the Lapis plugin
lapis-deps=
use-acf=true
custom-repos=
custom-deps=

## This stuff will probably never change, but it's configurable just in case
group=com.lapisdev

# Finally, some Gradle settings to make things faster
org.gradle.configuration-cache=true
org.gradle.parallel=true
org.gradle.caching=true
